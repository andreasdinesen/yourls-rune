name: Build and publish image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README.md'
      - 'runes/**'
  schedule:
    - cron: '30 4 * * 1' # weekly rebuild to pick up base-image security patches
  workflow_dispatch:
  workflow_call: # invoked by check-upstream.yml after a version bump

permissions:
  contents: read
  packages: write

jobs:
  # Fast end-to-end smoke test on amd64 before publishing the multi-arch image.
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: yourls-rune:test

      - name: Run the container
        run: |
          docker run -d --name yourls -p 8080:8080 \
            -e YOURLS_USER=admin \
            -e YOURLS_PASS=test1234 \
            -e YOURLS_PRIVATE= \
            -e PLUGINS='YOURLS/antispam, GautamGupta/YOURLS-Import-Export' \
            -e QR_CODE=true \
            yourls-rune:test

      - name: Wait for install to finish (login page appears)
        run: |
          # The login form (password field) only appears once YOURLS is installed;
          # before that /admin/ shows the installer. Poll for it.
          for i in $(seq 1 60); do
            body=$(curl -s http://localhost:8080/admin/ || true)
            if echo "$body" | grep -qi 'name="password"'; then
              echo "attempt $i -> login ready"; exit 0
            fi
            echo "attempt $i -> not ready yet"
            sleep 5
          done
          echo "::error::YOURLS login page never appeared"
          docker logs yourls
          exit 1

      - name: Assert the admin area requires login (empty YOURLS_PRIVATE trap)
        run: |
          # With YOURLS_PRIVATE deliberately blank (as yggdrasil sends it), the
          # admin page must still present the login, not open access.
          body=$(curl -s http://localhost:8080/admin/)
          echo "$body" | grep -qi 'name="password"' \
            || { echo "::error::admin area did not present a login"; docker logs yourls; exit 1; }
          echo "OK: login required"

      - name: Assert install completed and the root redirects
        run: |
          # The web installer must have reported success on first boot.
          docker logs yourls 2>&1 | grep -qiE "YOURLS-installation: OK" \
            || { echo "::error::YOURLS install did not complete"; docker logs yourls; exit 1; }
          # The bare root redirects to the admin (302), not a 403 directory listing.
          root=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ || true)
          echo "root -> HTTP $root"
          [ "$root" = "302" ] \
            || { echo "::error::root did not redirect to /admin/ (HTTP $root)"; docker logs yourls; exit 1; }
          echo "OK: installed and root redirects to /admin/"

      - name: Assert the requested plugin was installed (but not auto-activated)
        run: |
          # PLUGINS=YOURLS/antispam must land as a plugin.php in the persisted
          # user/plugins dir, owned by www-data so YOURLS can read it.
          docker exec yourls test -f /data/user/plugins/antispam/plugin.php \
            || { echo "::error::plugin was not installed"; docker logs yourls; exit 1; }
          docker logs yourls 2>&1 | grep -qi "Plugin 'antispam' installeret" \
            || { echo "::error::no install log line for the plugin"; docker logs yourls; exit 1; }
          # This repo ships a helper subdir (fileio/) sorting before plugin.php,
          # so it proves we pick the SHALLOWEST plugin.php, not the first found.
          docker exec yourls test -f /data/user/plugins/YOURLS-Import-Export/plugin.php \
            || { echo "::error::multi-dir plugin not installed at its root"; docker logs yourls; exit 1; }
          docker exec yourls test -f /data/user/plugins/YOURLS-Import-Export/fileio/csv.php \
            || { echo "::error::plugin subdirectory was not copied"; docker logs yourls; exit 1; }
          # Activation must stay the user's choice for downloaded plugins.
          active=$(docker exec yourls mariadb --protocol=socket -S /run/mysqld/mysqld.sock \
                   -uroot -N -B -e \
                   "SELECT option_value FROM yourls.yourls_options WHERE option_name='active_plugins';")
          echo "active_plugins = $active"
          if echo "$active" | grep -qE 'antispam|Import-Export'; then
            echo "::error::PLUGINS must not be auto-activated (got: $active)"; exit 1
          fi
          echo "OK: plugin installed, not auto-activated"

      - name: Assert the QR_CODE toggle installs, activates, and works
        run: |
          # Unlike PLUGINS, QR_CODE is a feature switch: it must end up active.
          docker exec yourls test -f /data/user/plugins/qr-code/plugin.php \
            || { echo "::error::qr-code plugin not installed"; docker logs yourls; exit 1; }
          active=$(docker exec yourls mariadb --protocol=socket -S /run/mysqld/mysqld.sock \
                   -uroot -N -B -e \
                   "SELECT option_value FROM yourls.yourls_options WHERE option_name='active_plugins';")
          echo "active_plugins = $active"
          echo "$active" | grep -q 'qr-code/plugin.php' \
            || { echo "::error::QR_CODE did not activate the plugin"; docker logs yourls; exit 1; }
          # End-to-end: "yourls" is one of YOURLS' sample links, so /yourls.qr
          # must redirect to the QR image service.
          loc=$(curl -s -o /dev/null -w '%{redirect_url}' http://localhost:8080/yourls.qr || true)
          echo "/yourls.qr -> $loc"
          case "$loc" in
            *api.qrserver.com*) echo "OK: QR redirect works" ;;
            *) echo "::error::/yourls.qr did not redirect to the QR service"; docker logs yourls; exit 1 ;;
          esac

      # Regression test for the reverse-proxy setup: a fresh instance configured
      # with an https YOURLS_SITE, reached over http with forwarded headers (as
      # nginx-proxy-manager does). Without honoring X-Forwarded-Proto this both
      # fails to install and redirect-loops on /admin/.
      - name: Assert proxied https setup installs and does not redirect-loop
        run: |
          docker run -d --name yourls-proxy -p 8081:8080 \
            -e YOURLS_USER=admin \
            -e YOURLS_PASS=test1234 \
            -e YOURLS_SITE=https://yourls.example.test \
            yourls-rune:test
          for i in $(seq 1 60); do
            body=$(curl -s -H 'X-Forwarded-Proto: https' -H 'X-Forwarded-Host: yourls.example.test' \
                   http://localhost:8081/admin/ || true)
            if echo "$body" | grep -qi 'name="password"'; then echo "attempt $i -> proxied login ready"; break; fi
            echo "attempt $i -> not ready yet"
            sleep 5
          done
          docker logs yourls-proxy 2>&1 | grep -qi "YOURLS-installation: OK" \
            || { echo "::error::proxied instance never installed"; docker logs yourls-proxy; exit 1; }
          code=$(curl -s -o /dev/null -w '%{http_code}' \
                 -H 'X-Forwarded-Proto: https' -H 'X-Forwarded-Host: yourls.example.test' \
                 http://localhost:8081/admin/ || true)
          echo "proxied /admin/ -> HTTP $code"
          [ "$code" = "200" ] \
            || { echo "::error::proxied admin returned $code (redirect loop?)"; docker logs yourls-proxy; exit 1; }
          echo "OK: proxied https instance installs and serves the login"

      - name: Dump logs
        if: always()
        run: |
          docker logs yourls || true
          echo "----- proxied instance -----"
          docker logs yourls-proxy || true

  publish:
    needs: smoke-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Attestation layers add unknown/unknown manifest entries that older
          # Docker on the yggdrasil host fails to pull — keep them off.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
